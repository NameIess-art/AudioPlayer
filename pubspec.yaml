name: nameless_audio
description: Android local audio player for multi-session ASMR and voice library playback.
publish_to: 'none'
version: 0.8.7+807

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  just_audio: ^0.10.5
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  path: ^1.9.1
  google_fonts: ^8.0.2
  mime: ^2.0.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.1
  sqflite: ^2.4.2
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1
  audio_session: ^0.2.1
  audio_service: ^0.18.18
  marquee: ^2.3.0
  text_scroll: ^0.2.1
  auto_size_text: ^3.0.0
  ffmpeg_kit_flutter_new_audio: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.6

dependency_overrides:
  audio_service:
    path: third_party/audio_service

flutter:
  uses-material-design: true
